        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function generateTableHTML() {
        const container = document.getElementById('verbGroupsContainer');
        container.innerHTML = '';
        for (let g of groups) {
            const groupVerbs = verbsData.slice(g.start, g.end);
            if (!groupVerbs.length) continue;
            let html = `<div class="group-card">
                <div class="group-header">
                    <h2>${escapeHtml(g.name)}</h2>
                    <div class="group-desc">${escapeHtml(g.desc)}</div>
                </div>
                <div class="table-wrapper">
                    <table class="verb-table">
                        <thead>
                            <tr><th>Infinitive</th><th>Simple Past</th><th>Past Participle</th><th>Meaning</th></tr>
                        </thead>
                        <tbody>`;
            for (let v of groupVerbs) {
                const infBtn = `<button class="audio-icon" title="${escapeHtml(v.pronInf)}" data-word="${escapeHtml(v.inf)}">🔊</button>`;
                const pastBtn = `<button class="audio-icon" title="${escapeHtml(v.pronPast)}" data-word="${escapeHtml(v.past)}">🔊</button>`;
                const ppBtn = `<button class="audio-icon" title="${escapeHtml(v.pronPP)}" data-word="${escapeHtml(v.pp)}">🔊</button>`;
                html += `<tr>
                    <td><div class="form-with-audio"><span class="form-text">${escapeHtml(v.inf)}</span> ${infBtn}</div></td>
                    <td><div class="form-with-audio"><span class="form-text">${escapeHtml(v.past)}</span> ${pastBtn}</div></td>
                    <td><div class="form-with-audio"><span class="form-text">${escapeHtml(v.pp)}</span> ${ppBtn}</div></td>
                    <td class="meaning-cell">${escapeHtml(v.meaning)}</td>
                </tr>`;
            }
            html += `</tbody></table></div></div>`;
            container.insertAdjacentHTML('beforeend', html);
        }
        // attach audio listeners
        document.querySelectorAll('.audio-icon').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const word = btn.getAttribute('data-word');
                if (word) speak(word);
            });
        });
    }

    generateTableHTML();
</script>
</body>
</html>
